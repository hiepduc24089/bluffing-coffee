name: bluffing-coffee

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bluffing_coffee_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: bluffing_coffee
      DB_USERNAME: bluffing_coffee
      DB_PASSWORD: bluffing_coffee
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bluffing_coffee

  nginx:
    image: nginx:1.27-alpine
    container_name: bluffing_coffee_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - bluffing_coffee

  mysql:
    image: mysql:8.4
    container_name: bluffing_coffee_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: bluffing_coffee
      MYSQL_USER: bluffing_coffee
      MYSQL_PASSWORD: bluffing_coffee
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bluffing_coffee

  redis:
    image: redis:7.4-alpine
    container_name: bluffing_coffee_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bluffing_coffee

volumes:
  backend_vendor:
  mysql_data:
  redis_data:

networks:
  bluffing_coffee:
    driver: bridge
